{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  .card-soft{
    border: 1px solid rgba(var(--bs-body-color-rgb), .12);
    border-radius: 18px;
    background: var(--bs-body-bg);
    box-shadow: 0 10px 26px rgba(0,0,0,.06);
  }
  .btn-round{ border-radius:12px; font-weight:800; }
  .muted{ color: rgba(var(--bs-body-color-rgb), .65); }
  .link-soft{ color: rgba(var(--bs-body-color-rgb), .8); text-decoration: none; }
  .link-soft:hover{ text-decoration: underline; }
</style>

<div class="container mt-4" style="max-width:520px;">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h3 class="m-0">Login</h3>
      <div class="muted small"> Please sign in.</div>
    </div>
  </div>

  <div class="card card-soft">
    <div class="card-body p-3">

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-bold">Email</label>
          <input class="form-control" name="email" type="email" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Password</label>
          <input class="form-control" name="password" type="password" required>
        </div>

        <button class="btn btn-primary btn-round w-100" type="submit">
          <i class="bi bi-box-arrow-in-right me-1"></i> Login
        </button>
      </form>

      {# ✅ Hide register + forgot password when coming from admin #}
      {% set next_page = request.args.get('next', '') %}
      {% if 'admin' not in next_page %}

        <div class="mt-3 text-center">
          <a class="link-soft" href="{{ url_for('auth.register') }}">No account? Register</a>
        </div>

        <!-- ✅ Forgot password UNDER Register link -->
        <div class="mt-2 text-center">
          <a class="link-soft" href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
        </div>

      {% endif %}

    </div>
  </div>
</div>
{% endblock %}
