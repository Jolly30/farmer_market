{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  .card-soft{
    border: 1px solid rgba(var(--bs-body-color-rgb), .12);
    border-radius: 18px;
    background: var(--bs-body-bg);
    box-shadow: 0 10px 26px rgba(0,0,0,.06);
  }
  .btn-round{ border-radius:12px; font-weight:800; }
  .muted{ color: rgba(var(--bs-body-color-rgb), .65); }
</style>

<div class="container mt-4" style="max-width:720px;">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h3 class="m-0">Reset Password</h3>
      <div class="muted small">Verify your email using OTP to reset your password</div>
    </div>

    <a class="btn btn-outline-secondary btn-round" href="{{ url_for('auth.login') }}">
      <i class="bi bi-arrow-left me-1"></i> Back
    </a>
  </div>

  <div class="card card-soft">
    <div class="card-body p-3">

      <form method="POST">

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label fw-bold">Email</label>
          <input class="form-control"
                 type="email"
                 name="email"
                 value="{{ email or '' }}"
                 required>
        </div>

        <!-- OTP row: OTP input + Send OTP button ALWAYS visible -->
        <div class="mb-3">
          <label class="form-label fw-bold">OTP</label>
          <div class="d-flex gap-2">
            <input class="form-control"
                   name="otp"
                   placeholder="Enter OTP"
                   value="{{ otp or '' }}">
            <button type="submit"
                    class="btn btn-outline-secondary btn-round"
                    name="action"
                    value="send_otp">
              Send OTP
            </button>
          </div>
          <div class="muted small mt-2">
            Click <b>Send OTP</b> anytime. OTP will be sent to your email.
          </div>
        </div>

        <!-- New password -->
        <div class="mb-3">
          <label class="form-label fw-bold">New Password</label>
          <input class="form-control"
                 type="password"
                 name="new_password"
                 placeholder="New password">
        </div>

        <!-- Confirm -->
        <div class="mb-3">
          <label class="form-label fw-bold">Confirm Password</label>
          <input class="form-control"
                 type="password"
                 name="confirm_password"
                 placeholder="Confirm password">
        </div>

        <!-- Buttons -->
        <div class="d-flex gap-2">
          <button type="submit"
                  class="btn btn-primary btn-round flex-grow-1"
                  name="action"
                  value="reset_password">
            Reset Password
          </button>

          <button type="submit"
                  class="btn btn-outline-danger btn-round"
                  name="action"
                  value="cancel">
            Cancel
          </button>
        </div>

        <div class="mt-3 text-center">
          <a class="text-decoration-none" href="{{ url_for('auth.login') }}">Back to login</a>
        </div>

      </form>

    </div>
  </div>
</div>
{% endblock %}
