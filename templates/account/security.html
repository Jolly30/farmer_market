{# templates/account/security.html #}
{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  /* Theme-safe card */
  .card-soft{
    border: 1px solid rgba(var(--bs-body-color-rgb), .10);
    border-radius: 18px;
    background: var(--bs-body-bg);
  }

  .muted{ color: var(--bs-secondary-color); }

  .row-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 14px;
    border-radius:14px;

    /* theme safe background/border */
    background: rgba(var(--bs-body-color-rgb), .03);
    border: 1px solid rgba(var(--bs-body-color-rgb), .10);

    text-decoration:none;
    color: var(--bs-body-color);
    transition:.12s ease;
  }

  .row-item:hover{
    background: rgba(var(--bs-body-color-rgb), .06);
    transform: translateY(-1px);
  }

  .left{
    display:flex;
    gap:12px;
    align-items:center;
    min-width:0;
  }

  .ico{
    width:42px;
    height:42px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;

    /* theme-safe icon box */
    background: rgba(var(--bs-primary-rgb), .12);
    border: 1px solid rgba(var(--bs-primary-rgb), .22);
    color: var(--bs-primary);
    flex:0 0 auto;
  }

  .title{
    font-weight:800;
    margin:0;
    line-height:1.1;
    color: var(--bs-body-color);
  }

  .value{
    font-size:.92rem;
    color: var(--bs-secondary-color);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 200px;
  }

  .chev{
    color: rgba(var(--bs-body-color-rgb), .45);
    font-size:18px;
  }
</style>

<div class="container mt-4" style="max-width:860px;">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h3 class="m-0">Security</h3>
      <div class="muted small">Manage your login and contact settings</div>
    </div>
  </div>

  <div class="card card-soft shadow-sm">
    <div class="card-body p-3">

      <div class="d-grid gap-2">

        <a class="row-item" href="{{ url_for('security.change_username') }}">
          <div class="left">
            <div class="ico"><i class="bi bi-at"></i></div>
            <div style="min-width:0">
              <div class="title">Username</div>
              <div class="value">@{{ current_user.username }}</div>
            </div>
          </div>
          <div class="chev"><i class="bi bi-chevron-right"></i></div>
        </a>

        <a class="row-item" href="{{ url_for('security.change_email') }}">
          <div class="left">
            <div class="ico"><i class="bi bi-envelope"></i></div>
            <div style="min-width:0">
              <div class="title">Email</div>
              <div class="value">{{ current_user.email }}</div>
            </div>
          </div>
          <div class="chev"><i class="bi bi-chevron-right"></i></div>
        </a>

        <a class="row-item" href="{{ url_for('security.change_phone') }}">
          <div class="left">
            <div class="ico"><i class="bi bi-telephone"></i></div>
            <div style="min-width:0">
              <div class="title">Phone</div>
              <div class="value">{{ current_user.phone or "Not set" }}</div>
            </div>
          </div>
          <div class="chev"><i class="bi bi-chevron-right"></i></div>
        </a>

        <a class="row-item" href="{{ url_for('security.change_password') }}">
          <div class="left">
            <div class="ico"><i class="bi bi-key"></i></div>
            <div style="min-width:0">
              <div class="title">Password</div>
              <div class="value">Change your password</div>
            </div>
          </div>
          <div class="chev"><i class="bi bi-chevron-right"></i></div>
        </a>

      </div>

    </div>
  </div>
</div>
{% endblock %}
