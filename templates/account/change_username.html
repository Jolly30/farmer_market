{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  .card-soft{
    border-radius:18px;
  }
  .btn-round{
    border-radius:12px;
    font-weight:800;
  }
</style>

<div class="container mt-4" style="max-width:720px;">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h3 class="m-0">Change Username</h3>
      <div class="text-body-secondary small">Username must be unique</div>
    </div>

    <a class="btn btn-outline-secondary btn-round"
       href="{{ url_for('security.security_home') }}">
      <i class="bi bi-arrow-left me-1"></i> Back
    </a>
  </div>

  <div class="card border-0 shadow-sm bg-body card-soft">
    <div class="card-body p-3">
      <form method="POST">

        <label class="form-label fw-bold">New username</label>
        <input
          class="form-control bg-body"
          name="username"
          value="{{ current_user.username }}"
          required
        >

        <div class="d-flex flex-wrap gap-2 mt-3">
          <button class="btn btn-primary btn-round" type="submit">
            <i class="bi bi-check2-circle me-1"></i> Save
          </button>

          <a class="btn btn-outline-secondary btn-round"
             href="{{ url_for('security.security_home') }}">
             Cancel
          </a>
        </div>

      </form>
    </div>
  </div>
</div>
{% endblock %}
